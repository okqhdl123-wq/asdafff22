<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>J CONFIGS — Admin</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:       #0d1117;
      --surface:  #161b22;
      --surface2: #1c2128;
      --border:   #30363d;
      --accent:   #7c3aed;
      --accent2:  #9f67ff;
      --green:    #22c55e;
      --red:      #ef4444;
      --yellow:   #f59e0b;
      --text:     #e6edf3;
      --muted:    #8b949e;
      --radius:   12px;
    }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      line-height: 1.6; min-height: 100vh;
    }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ── Login overlay ── */
    #login-screen {
      position: fixed; inset: 0; background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      z-index: 999;
    }
    .login-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 2.5rem;
      width: 100%; max-width: 360px; text-align: center;
    }
    .login-logo {
      font-size: 2rem; font-weight: 900;
      background: linear-gradient(135deg, #9f67ff, #c084fc);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      margin-bottom: .25rem;
    }
    .login-card h2 { font-size: 1rem; color: var(--muted); margin-bottom: 1.75rem; font-weight: 400; }
    .login-card input {
      width: 100%; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; padding: .75rem 1rem;
      color: var(--text); font-size: 1rem; outline: none;
      transition: border-color .2s; margin-bottom: .75rem;
    }
    .login-card input:focus { border-color: var(--accent); }
    .login-card button {
      width: 100%; background: var(--accent); color: #fff; border: none;
      border-radius: 8px; padding: .75rem; font-size: 1rem; font-weight: 700;
      cursor: pointer; transition: background .2s;
    }
    .login-card button:hover { background: var(--accent2); }
    #login-error { color: var(--red); font-size: .85rem; margin-top: .6rem; }

    /* ── Main app ── */
    #app { display: none; }

    nav {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 0 2rem; height: 60px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .nav-logo {
      font-size: 1.2rem; font-weight: 800;
      background: linear-gradient(135deg, #9f67ff, #c084fc);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .nav-right { display: flex; align-items: center; gap: 1rem; }
    .logout-btn {
      background: transparent; border: 1px solid var(--border);
      color: var(--muted); padding: .35rem .9rem; border-radius: 7px;
      font-size: .85rem; cursor: pointer; transition: all .2s;
    }
    .logout-btn:hover { border-color: var(--red); color: var(--red); }

    .container { max-width: 1200px; margin: 0 auto; padding: 2rem; }

    /* ── Cards ── */
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 1.5rem; margin-bottom: 1.5rem;
    }
    .card-title {
      font-size: 1rem; font-weight: 700; margin-bottom: 1.25rem;
      display: flex; align-items: center; gap: .5rem;
    }

    /* ── Stats row ── */
    .stats-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 1rem; margin-bottom: 1.5rem;
    }
    .stat-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 1.25rem;
    }
    .stat-label { color: var(--muted); font-size: .8rem; margin-bottom: .3rem; }
    .stat-value { font-size: 1.8rem; font-weight: 800; }
    .stat-green { color: var(--green); }
    .stat-purple { color: var(--accent2); }
    .stat-yellow { color: var(--yellow); }

    /* ── Issue form ── */
    .form-row { display: flex; gap: .75rem; flex-wrap: wrap; }
    .form-row input, .form-row select {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; padding: .6rem .9rem;
      color: var(--text); font-size: .9rem; outline: none;
      transition: border-color .2s; flex: 1; min-width: 140px;
    }
    .form-row input:focus, .form-row select:focus { border-color: var(--accent); }
    .btn { padding: .6rem 1.2rem; border-radius: 8px; font-size: .875rem; font-weight: 600; cursor: pointer; border: none; transition: all .2s; }
    .btn-accent { background: var(--accent); color: #fff; }
    .btn-accent:hover { background: var(--accent2); }
    .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--muted); }
    .btn-outline:hover { border-color: var(--accent2); color: var(--accent2); }
    .btn-green { background: rgba(34,197,94,.15); border: 1px solid rgba(34,197,94,.3); color: var(--green); }
    .btn-red   { background: rgba(239,68,68,.15);  border: 1px solid rgba(239,68,68,.3);  color: var(--red); }

    /* ── Discord settings ── */
    .discord-row { display: flex; gap: .75rem; }
    .discord-row input { flex: 1; }

    /* ── Table ── */
    .table-wrap { overflow-x: auto; }
    table {
      width: 100%; border-collapse: collapse; font-size: .875rem;
      white-space: nowrap;
    }
    thead th {
      background: var(--surface2); color: var(--muted);
      font-size: .75rem; font-weight: 600; letter-spacing: .5px;
      text-transform: uppercase; padding: .7rem 1rem; text-align: left;
    }
    tbody tr { border-bottom: 1px solid var(--border); transition: background .15s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--surface2); }
    tbody td { padding: .75rem 1rem; }
    .code-cell {
      font-family: 'Consolas', monospace; letter-spacing: 1px;
      color: var(--accent2);
    }
    .badge {
      font-size: .7rem; font-weight: 700; padding: .2rem .55rem;
      border-radius: 20px; display: inline-block;
    }
    .badge-active   { background: rgba(34,197,94,.15); color: var(--green); border: 1px solid rgba(34,197,94,.3); }
    .badge-expired  { background: rgba(239,68,68,.15);  color: var(--red);   border: 1px solid rgba(239,68,68,.3); }
    .badge-manual   { background: rgba(245,158,11,.15); color: var(--yellow); border: 1px solid rgba(245,158,11,.3); }

    .empty-state { text-align: center; padding: 3rem; color: var(--muted); }

    /* ── Search ── */
    .table-toolbar {
      display: flex; gap: .75rem; margin-bottom: 1rem;
      align-items: center; flex-wrap: wrap;
    }
    .table-toolbar input {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; padding: .5rem .9rem;
      color: var(--text); font-size: .875rem; outline: none;
      transition: border-color .2s; flex: 1; min-width: 180px;
    }
    .table-toolbar input:focus { border-color: var(--accent); }
    .row-count { color: var(--muted); font-size: .8rem; white-space: nowrap; }

    /* ── Toast ── */
    #toast {
      position: fixed; bottom: 2rem; right: 2rem;
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); padding: .75rem 1.25rem;
      border-radius: 10px; font-size: .875rem;
      transform: translateY(80px); opacity: 0;
      transition: all .3s; pointer-events: none; z-index: 200;
    }
    #toast.show { transform: translateY(0); opacity: 1; }

    .spinner {
      width: 16px; height: 16px; border: 2px solid rgba(255,255,255,.2);
      border-top-color: #fff; border-radius: 50%;
      animation: spin .6s linear infinite; display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 640px) {
      .container { padding: 1rem; }
      nav { padding: 0 1rem; }
    }
  </style>
</head>
<body>

<!-- ── Login Screen ── -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">J CONFIGS</div>
    <h2>관리자 패널</h2>
    <input type="password" id="pw-input" placeholder="비밀번호"
           onkeydown="if(event.key==='Enter') doLogin()" />
    <button onclick="doLogin()">로그인</button>
    <div id="login-error"></div>
  </div>
</div>

<!-- ── Main App ── -->
<div id="app">
  <nav>
    <span class="nav-logo">J CONFIGS Admin</span>
    <div class="nav-right">
      <span style="color:var(--muted);font-size:.85rem" id="nav-time"></span>
      <button class="logout-btn" onclick="doLogout()">로그아웃</button>
    </div>
  </nav>

  <div class="container">

    <!-- Stats -->
    <div class="stats-grid" id="stats-grid">
      <div class="stat-card"><div class="stat-label">총 주문</div><div class="stat-value stat-purple" id="stat-total">—</div></div>
      <div class="stat-card"><div class="stat-label">오늘 주문</div><div class="stat-value stat-green" id="stat-today">—</div></div>
      <div class="stat-card"><div class="stat-label">활성 라이센스</div><div class="stat-value stat-green" id="stat-active">—</div></div>
      <div class="stat-card"><div class="stat-label">오늘 수익</div><div class="stat-value stat-yellow" id="stat-revenue">—</div></div>
    </div>

    <!-- Discord Webhook 설정 -->
    <div class="card">
      <div class="card-title">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="#5865f2"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057c.003.022.015.043.03.056a19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 13.65 13.65 0 0 0 1.17-1.907.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.169 1.906a.077.077 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/></svg>
        Discord 웹훅 설정
      </div>
      <div class="discord-row">
        <input type="text" id="webhook-url" placeholder="https://discord.com/api/webhooks/..." />
        <button class="btn btn-green" onclick="saveWebhook()">저장</button>
        <button class="btn btn-outline" onclick="testWebhook()">테스트</button>
      </div>
      <p style="color:var(--muted);font-size:.8rem;margin-top:.6rem">입금 확인 시 이 채널로 자동 알림이 전송됩니다.</p>
    </div>

    <!-- 수동 코드 발급 -->
    <div class="card">
      <div class="card-title">🎫 수동 코드 발급</div>
      <div class="form-row">
        <input type="text"   id="issue-name"   placeholder="입금자명" />
        <input type="email"  id="issue-email"  placeholder="이메일 (코드 발송)" />
        <select id="issue-product">
          <option value="aim">🎯 에임어시스트</option>
          <option value="movement">⚡ 무브먼트</option>
        </select>
        <input type="number" id="issue-amount" placeholder="금액 (10000/20000/50000/100000)" />
        <button class="btn btn-accent" id="issue-btn" onclick="issueManual()">발급</button>
      </div>
      <div id="issue-result" style="margin-top:.75rem;display:none"></div>
    </div>

    <!-- 주문 목록 -->
    <div class="card">
      <div class="card-title">📋 주문 목록</div>
      <div class="table-toolbar">
        <input type="text" id="search-input" placeholder="이름 또는 코드로 검색..."
               oninput="filterTable()" />
        <span class="row-count" id="row-count"></span>
        <button class="btn btn-outline" onclick="loadOrders()">새로고침</button>
      </div>
      <div class="table-wrap">
        <table id="orders-table">
          <thead>
            <tr>
              <th>주문 ID</th>
              <th>입금자</th>
              <th>상품</th>
              <th>금액</th>
              <th>기간</th>
              <th>날짜</th>
              <th>코드</th>
              <th>만료일</th>
              <th>상태</th>
              <th>복사</th>
            </tr>
          </thead>
          <tbody id="orders-body">
            <tr><td colspan="10" class="empty-state">데이터를 불러오는 중...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

  </div><!-- /container -->
</div><!-- /app -->

<div id="toast"></div>

<script>
  // ════════════════════════════════
  //   ★ 설정
  // ════════════════════════════════
  const SCRIPT_URL   = 'https://script.google.com/macros/s/AKfycbx5txmb5mV92RypEWiXgceSj1RW-loP4dGijTEFVxhGHubsuCKpt9ZYlW8h9uOUT5xh/exec';
  const ADMIN_TOKEN  = 'jconfigs3167';
  const ADMIN_PW_HASH = 'c5b415656a192bbc08a33cb8718f7eb9673a80134e98ee01c31f99fe93cf842b';

  // ════════════════════════════════
  //   로그인
  // ════════════════════════════════
  async function sha256(text) {
    const buf  = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(text));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
  }

  async function doLogin() {
    const pw   = document.getElementById('pw-input').value;
    const hash = await sha256(pw);
    if (hash === ADMIN_PW_HASH) {
      sessionStorage.setItem('admin_ok', '1');
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      init();
    } else {
      document.getElementById('login-error').textContent = '비밀번호가 틀렸습니다.';
      document.getElementById('pw-input').value = '';
    }
  }

  function doLogout() {
    sessionStorage.removeItem('admin_ok');
    location.reload();
  }

  // 이미 로그인된 세션이면 바로 앱 진입
  if (sessionStorage.getItem('admin_ok') === '1') {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
  }

  // ════════════════════════════════
  //   초기화
  // ════════════════════════════════
  let allOrders = [];

  function init() {
    // 시계
    setInterval(() => {
      document.getElementById('nav-time').textContent = new Date().toLocaleTimeString('ko-KR');
    }, 1000);

    // Webhook URL 복원
    const saved = localStorage.getItem('discord_webhook');
    if (saved) document.getElementById('webhook-url').value = saved;

    loadOrders();
  }

  // ════════════════════════════════
  //   주문 목록 로드 (Apps Script)
  // ════════════════════════════════
  async function loadOrders() {
    const tbody = document.getElementById('orders-body');
    tbody.innerHTML = '<tr><td colspan="10" class="empty-state"><span class="spinner"></span></td></tr>';

    try {
      const url  = `${SCRIPT_URL}?action=admin&token=${ADMIN_TOKEN}&cmd=list`;
      const res  = await fetch(url);
      const data = await res.json();

      if (data.status !== 'success') throw new Error(data.message);
      allOrders = data.orders || [];
      renderOrders(allOrders);
      updateStats(allOrders);
    } catch(e) {
      tbody.innerHTML = `<tr><td colspan="9" class="empty-state" style="color:var(--red)">로드 실패: ${e.message}</td></tr>`;
    }
  }

  function renderOrders(orders) {
    const tbody = document.getElementById('orders-body');
    if (!orders.length) {
      tbody.innerHTML = '<tr><td colspan="10" class="empty-state">주문 내역이 없습니다.</td></tr>';
      document.getElementById('row-count').textContent = '0건';
      return;
    }

    document.getElementById('row-count').textContent = `${orders.length}건`;

    // 최신순 정렬
    const sorted = [...orders].reverse();

    tbody.innerHTML = sorted.map(o => {
      const badgeClass = o.status === 'completed' ? 'badge-active' : 'badge-expired';
      const badgeText  = o.status === 'completed' ? '완료' : o.status;
      const isManual   = o.orderId && o.orderId.startsWith('MAN-');
      return `
        <tr>
          <td style="color:var(--muted);font-size:.8rem">${o.orderId || '—'}</td>
          <td><strong>${o.name}</strong></td>
          <td>${o.product === 'aim' ? '🎯 에임어시스트' : o.product === 'movement' ? '⚡ 무브먼트' : '—'}</td>
          <td>${Number(o.amount).toLocaleString()}원</td>
          <td>${o.days}일</td>
          <td style="color:var(--muted)">${o.date}</td>
          <td class="code-cell">${o.code}</td>
          <td style="color:var(--muted)">${o.expiry || '—'}</td>
          <td>
            <span class="badge ${isManual ? 'badge-manual' : badgeClass}">
              ${isManual ? '수동' : badgeText}
            </span>
          </td>
          <td>
            <button class="btn btn-outline" style="padding:.3rem .7rem;font-size:.75rem"
                    onclick="copyToClip('${o.code}')">복사</button>
          </td>
        </tr>
      `;
    }).join('');
  }

  function filterTable() {
    const q = document.getElementById('search-input').value.toLowerCase();
    if (!q) { renderOrders(allOrders); return; }
    const filtered = allOrders.filter(o =>
      (o.name || '').toLowerCase().includes(q) ||
      (o.code || '').toLowerCase().includes(q)
    );
    renderOrders(filtered);
  }

  function updateStats(orders) {
    const today = new Date().toLocaleDateString('ko-KR').replace(/\. /g,'/').replace('.','');
    const todayOrders   = orders.filter(o => o.date && o.date.startsWith(new Date().toISOString().slice(0,10).replace(/-/g,'/')));
    const todayRevenue  = todayOrders.reduce((s, o) => s + Number(o.amount || 0), 0);

    document.getElementById('stat-total').textContent   = orders.length;
    document.getElementById('stat-today').textContent   = todayOrders.length;
    document.getElementById('stat-active').textContent  = orders.filter(o => o.status === 'completed').length;
    document.getElementById('stat-revenue').textContent = todayRevenue.toLocaleString() + '원';
  }

  // ════════════════════════════════
  //   수동 발급
  // ════════════════════════════════
  async function issueManual() {
    const name    = document.getElementById('issue-name').value.trim();
    const email   = document.getElementById('issue-email').value.trim();
    const product = document.getElementById('issue-product').value;
    const amount  = parseInt(document.getElementById('issue-amount').value, 10);
    if (!name || isNaN(amount)) { showToast('이름과 금액을 입력하세요.'); return; }

    const btn = document.getElementById('issue-btn');
    btn.innerHTML = '<span class="spinner"></span>';
    btn.disabled  = true;

    try {
      const url  = `${SCRIPT_URL}?action=deposit&name=${encodeURIComponent(name)}&email=${encodeURIComponent(email)}&product=${product}&amount=${amount}&token=${ADMIN_TOKEN}&manual=1`;
      const res  = await fetch(url);
      const data = await res.json();

      const result = document.getElementById('issue-result');
      result.style.display = 'block';

      if (data.status === 'success') {
        result.innerHTML = `
          <div style="background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.3);border-radius:8px;padding:.9rem 1.1rem">
            <div style="color:var(--muted);font-size:.75rem;margin-bottom:.3rem">발급 완료</div>
            <div style="font-family:Consolas,monospace;font-size:1.2rem;color:var(--accent2);letter-spacing:2px">${data.code}</div>
            <div style="color:var(--muted);font-size:.8rem;margin-top:.2rem">만료: ${data.expiry} (${data.days}일)</div>
          </div>
        `;
        // Discord 웹훅 전송
        sendDiscordNotification(name, amount, data.code, data.expiry, data.days, true);
        loadOrders();
      } else {
        result.innerHTML = `<div style="color:var(--red)">${data.message}</div>`;
      }
    } catch(e) {
      showToast('발급 실패: ' + e.message);
    }

    btn.textContent = '발급';
    btn.disabled    = false;
  }

  // ════════════════════════════════
  //   Discord 웹훅
  // ════════════════════════════════
  function saveWebhook() {
    const url = document.getElementById('webhook-url').value.trim();
    localStorage.setItem('discord_webhook', url);
    showToast('웹훅 URL이 저장되었습니다.');
  }

  async function testWebhook() {
    const url = document.getElementById('webhook-url').value.trim();
    if (!url) { showToast('웹훅 URL을 먼저 입력하세요.'); return; }
    await sendDiscordRaw(url, {
      embeds: [{
        title: '🧪 jmov 웹훅 테스트',
        description: '웹훅이 정상적으로 연결되었습니다!',
        color: 0x7c3aed,
        timestamp: new Date().toISOString()
      }]
    });
    showToast('테스트 메시지를 전송했습니다!');
  }

  async function sendDiscordNotification(name, amount, code, expiry, days, isManual) {
    const url = localStorage.getItem('discord_webhook');
    if (!url) return;
    await sendDiscordRaw(url, {
      embeds: [{
        title: isManual ? '🔧 수동 코드 발급' : '💰 새 입금 확인',
        color: isManual ? 0xf59e0b : 0x22c55e,
        fields: [
          { name: '입금자',   value: name,                        inline: true },
          { name: '금액',     value: Number(amount).toLocaleString() + '원', inline: true },
          { name: '기간',     value: days + '일',                 inline: true },
          { name: '코드',     value: '`' + code + '`',            inline: false },
          { name: '만료일',   value: expiry,                      inline: true },
        ],
        timestamp: new Date().toISOString(),
        footer: { text: 'jmov License System' }
      }]
    });
  }

  async function sendDiscordRaw(webhookUrl, payload) {
    try {
      await fetch(webhookUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
    } catch(e) {
      showToast('Discord 전송 실패: ' + e.message);
    }
  }

  // ════════════════════════════════
  //   유틸
  // ════════════════════════════════
  function copyToClip(text) {
    navigator.clipboard.writeText(text).then(() => showToast('복사됨: ' + text));
  }

  let toastTimer;
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
  }

  // 세션 확인 후 초기화
  if (sessionStorage.getItem('admin_ok') === '1') init();
</script>
</body>
</html>
